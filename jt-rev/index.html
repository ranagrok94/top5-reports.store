   var(--brand-500);\n\n  --text-heading:    var(--brand-700);\n  --text-body:       var(--text-main);\n  --text-secondary:  var(--text-muted);\n  --text-on-brand:   #FFFFFF;\n\n  --surface-page:    var(--bg-page);\n  --surface-card:    var(--bg-card);\n  --surface-info:    var(--accent-info-bg);\n  --surface-success: var(--success-bg);\n  --surface-danger:  var(--danger-bg);\n\n  --border-default:  var(--border);\n  --border-strong:   #B6C0CC;\n  --focus-ring:      rgba(26, 111, 190, 0.35);\n}\n<\/style>\n  <style>/* ============================================================\n   Typography tokens — Joint Health Design System\n   ============================================================ */\n:root {\n  /* Families */\n  --font-heading: 'Oswald', 'Arial Narrow', system-ui, sans-serif;\n  --font-body:    'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n\n  /* Weights */\n  --fw-regular: 400;   /* @kind other */\n  --fw-medium:  500;   /* @kind other */\n  --fw-semibold: 600;  /* @kind other */\n  --fw-bold:    700;   /* @kind other */\n\n  /* Heading scale (Oswald) */\n  --h1-size: 36px; --h1-weight: var(--fw-bold);     /* @kind other */\n  --h1-lh: 1.2;  /* @kind other */\n  --h2-size: 28px; --h2-weight: var(--fw-bold);     /* @kind other */\n  --h2-lh: 1.3;  /* @kind other */\n  --h3-size: 20px; --h3-weight: var(--fw-semibold); /* @kind other */\n  --h3-lh: 1.3;  /* @kind other */\n\n  /* Body scale (Inter) */\n  --body-lg-size: 16px;  --body-lg-lh: 1.6;  /* @kind other */\n  --body-md-size: 14px;  --body-md-lh: 1.6;  /* @kind other */\n  --caption-size: 12px;\n  --caption-lh: 1.5;  /* @kind other */\n\n  /* Tracking — Oswald sits tighter; small caps need air */\n  --tracking-heading: 0.2px;\n  --tracking-eyebrow: 1.2px;\n}\n\n/* Optional ready-made type classes consumers can use */\n.jh-h1 { font-family: var(--font-heading); font-size: var(--h1-size); line-height: var(--h1-lh); font-weight: var(--h1-weight); color: var(--text-heading); letter-spacing: var(--tracking-heading); margin: 0; }\n.jh-h2 { font-family: var(--font-heading); font-size: var(--h2-size); line-height: var(--h2-lh); font-weight: var(--h2-weight); color: var(--text-heading); letter-spacing: var(--tracking-heading); margin: 0; }\n.jh-h3 { font-family: var(--font-heading); font-size: var(--h3-size); line-height: var(--h3-lh); font-weight: var(--h3-weight); color: var(--text-heading); margin: 0; }\n.jh-body-lg { font-family: var(--font-body); font-size: var(--body-lg-size); line-height: var(--body-lg-lh); color: var(--text-body); margin: 0; }\n.jh-body { font-family: var(--font-body); font-size: var(--body-md-size); line-height: var(--body-md-lh); color: var(--text-body); margin: 0; }\n.jh-caption { font-family: var(--font-body); font-size: var(--caption-size); line-height: var(--caption-lh); color: var(--text-secondary); margin: 0; }\n.jh-eyebrow { font-family: var(--font-heading); font-size: 13px; font-weight: var(--fw-semibold); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--color-primary); margin: 0; }\n<\/style>\n  <style>/* ============================================================\n   Spacing tokens — 4px base grid\n   ============================================================ */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Semantic spacing */\n  --gap-inline:    var(--space-2);\n  --gap-stack:     var(--space-4);\n  --pad-card:      var(--space-6);\n  --pad-section:   var(--space-16);\n  --container-max: 1120px;\n}\n<\/style>\n  <style>/* ============================================================\n   Border-radius tokens\n   ============================================================ */\n:root {\n  --radius-badge:  4px;\n  --radius-button: 8px;\n  --radius-input:  8px;\n  --radius-card:   12px;\n  --radius-p eading)}\n.rank-bar--bronze{background:linear-gradient(90deg,#f2f2f2,#f9f9f9);border-left:5px solid var(--text-muted)}\n.rank-bar--4{background:linear-gradient(90deg,#f2f2f2,#f9f9f9);border-left:5px solid var(--border)}\n.rank-bar__title{font-family:var(--font-heading);font-size:clamp(20px,3vw,34px);font-weight:700;margin:0;letter-spacing:-.3px}\n.rank-bar__title--gold{color:var(--brand-700)}\n.rank-bar__title--silver{color:var(--text-heading)}\n.rank-bar__title--other{color:var(--text-muted)}\n.rank-bar__num--gold{color:var(--brand-500)}\n.rank-bar__num--silver{color:var(--text-muted)}\n.rank-bar__num--other{color:var(--border-strong)}\n.rank-bar__medal{width:90px;height:90px;object-fit:contain}\n@media(max-width:480px){.rank-bar__medal{width:65px;height:65px}.rank-bar__title{font-size:22px}}\n\n.rank-body{background:var(--bg-card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-card) var(--radius-card);padding:14px 22px 22px}\n.rank-body--blue{border-color:var(--brand-300)}\n.rank-strip{display:flex;align-items:center;gap:28px;padding:14px 0;    justify-content: space-evenly}\n.rank-strip__img{flex:0 0 auto}\n.rank-strip__img img{width:150px;height:auto}\n.rank-strip__img--lg img{width:180px}\n.rank-ratings{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:24px}\n@media(max-width:480px){.rank-strip{flex-direction:column;align-items:center;gap:14px}.rank-ratings{flex-direction:row;gap:30px}.rank-strip__img img,.rank-strip__img--lg img{width:150px}}\n@media(max-width:768px){.rank-strip__img img,.rank-strip__img--lg img{width:140px}}\n\n/* ── GAUGE ─────────────────────────────────── */\n.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}\n.gauge{position:relative;width:100px;height:100px}\n.gauge svg{transform:rotate(-90deg);width:100px;height:100px}\n.gauge__bg{fill:none;stroke:var(--border);stroke-width:8}\n.gauge__fill--green{fill:none;stroke:var(--success-500);stroke-width:8;stroke-lineca n\n<!-- AUTHOR CARD -->\n<div class=\"container--narrow\">\n  <div class=\"author-card\">\n    <div class=\"author-card__top\">\n      <span class=\"author-card__site\">Clinical Insights<\/span>\n      <div class=\"author-card__dot\"><\/div>\n      <span class=\"author-card__tag\">Joint Health Review Panel<\/span>\n    <\/div>\n    <div class=\"author-card__body\">\n      <div class=\"author-card__info\">\n        <div class=\"author-card__meta\">\n          <span class=\"author-card__meta-item\">🕐 Posted: <strong>7 days ago<\/strong><\/span>\n          <div class=\"author-card__divider\" aria-hidden=\"true\"><\/div>\n          <span class=\"author-card__meta-item\">👀 <strong>12,182<\/strong> views<\/span>\n          <div class=\"author-card__divider\" aria-hidden=\"true\"><\/div>\n          <span class=\"author-card__meta-item\">👍 <strong>312<\/strong> likes<\/span>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- MAIN CONTENT -->\n<main id=\"main-content\">\n\n<!-- INTRO -->\n<section aria-labelledby=\"intro-heading\">\n  <div class=\"editorial\">\n    <h2 id=\"intro-heading\" class=\"section-subtitle\">How Can You Tell a Joint Formula That Works from One That Just Masks the Pain?<\/h2>\n\n    <div class=\"stat-callout\" role=\"note\">\n      <div class=\"stat-number\" aria-hidden=\"true\">10M+<\/div>\n      <div class=\"stat-text\">people in the UK live with joint pain or arthritis — and most reach first for a cream or pill that only numbs the surface, never touching what drives the pain inside the joint. <em>Source: Versus Arthritis<\/em><\/div>\n    <\/div>\n\n    <p class=\"body-text\">If your first steps out of bed feel like <strong>a rusty hinge that needs to \"warm up\"<\/strong>… if stairs have quietly become the enemy… you've probably been told the same thing: <strong>\"It's just age. Wear and tear. Take a painkiller.\"<\/strong> But here's the truth: local inflammation and cartilage destruction quietly progress without intervention. Unless you address the root cause—not just mask the pain—mild discomfort can advance to serious conditions like osteoarthritis. You need a solution that works inside the joint. A repair mechanism, not a painkiller.\n\n    When it comes to real, lasting relief, that dismissive shrug misses what's actually happening inside the joint.<\/p>\n\n    <div class=\"img-wrap\">\n      <img id=\"jointComfortImg\" alt=\"UK adult moving comfortably without morning joint stiffness\" width=\"640\" height=\"427\" loading=\"lazy\">\n    <\/div>\n  <script>document.getElementById('jointComfortImg').src = window.__resources?.jointComfort || 'images/joint-pain.webp';<\/script>\n\n    <p class=\"body-text\">Have you tried to relieve your joint pain but struggled to see lasting results? New thinking points to two things conventional advice ignores: a <strong>runaway inflammation loop<\/strong> that keeps damaging the very cushion it's meant to protect — and the <strong>age-related decline of the repair cells<\/strong> your cartilage depends on.<\/p>\n\n    <div class=\"doc-card\" role=\"blockquote\">\n      <div class=\"doc-avatar\" aria-hidden=\"true\">CI<\/div>\n      <div>\n        <div class=\"doc-name\">Clinical Insights Review Panel<\/div>\n        <div class=\"doc-title\">Independent Joint Health Editorial Team<\/div>\n        <p class=\"doc-text\">We compared every formula on one transparent question: <strong>does it reach inside the joint and work on more than one driver of pain — or does it just numb the surface?<\/strong> One formula kept separating itself from the rest — <strong>not through marketing claims, but through what's actually inside it.<\/strong><\/p>\n      <\/div>\n    <\/div>\n\n    <p class=\"body-text\">Here's the part most ads won't tell you: a warming balm feels good on the skin, but the wear that makes the hinge seize up is on the <strong>inside<\/strong> — and surface comfort doesn't reach it. <strong>Numbing the surface won't fix the underlying problem.<\/strong><\/p>\n\n    <p class=\"body-text\">In this review, we break down the <strong>5 most talked-about UK joint formulas<\/strong> — including the viral balms. Our criteria are strict: does it reach inside the joint, does it work on more than one driver of pain — inflammation, cartilage and repair — and <strong>how fast does real relief actually arrive?<\/strong><\/p>\n\n    <blockquote class=\"pullquote\">\"By the end of this article, you'll know exactly which formula was built to reach the cause from within — and why it earned our #1 spot for 2026.\"<\/blockquote>\n\n    <h2 class=\"section-title\" style=\"margin-top:36px\">How We Evaluated the Options<\/h2>\n\n    <div class=\"criteria-wrap\">\n      <div class=\"criteria-item\">\n        <div class=\"criteria-icon\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M9 12l2 2 4-4\"><\/path><circle cx=\"12\" cy=\"12\" r=\"9\"><\/circle><\/svg><\/div>\n        <div>\n          <div class=\"criteria-label\">Reaches Inside the Joint<\/div>\n          <div class=\"criteria-desc\">Does it work systemically inside the joint capsule, or only on the surface of the skin — where a cream or balm can never reach the real damage?<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"criteria-item\">\n        <div class=\"criteria-icon\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 3h18v4H3zM3 10h18v4H3zM3 17h18v4H3z\"><\/path><\/svg><\/div>\n        <div>\n          <div class=\"criteria-label\">Multi-Mechanism Support<\/div>\n          <div class=\"criteria-desc\">Does it work on all three drivers — inflammation, cartilage and repair — using patented actives, or rely on a single underdosed ingredient?<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"criteria-item\">\n        <div class=\"criteria-icon\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\/circle><path d=\"M12 6v6l4 2\"><\/path><\/svg><\/div>\n        <div>\n          <div class=\"criteria-label\">Speed to First Relief<\/div>\n          <div class=\"criteria-desc\">Is there clinical backing for noticeable relief from around 5 days, or does it ask you to wait 8–12 weeks — so most people quit first?<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- FOUNDATION -->\n<section aria-labelledby=\"foundation-heading\">\n  <div class=\"editorial\">\n    <h2 id=\"foundation-heading\" class=\"section-title\">Understanding the Real Cause of Joint Pain<\/h2>\n    <p class=\"body-text\">Most people focus on masking symptoms with painkillers, a warming balm, or a basic glucosamine capsule. But masking the surface is like <strong>polishing the door instead of oiling the hinge<\/strong> — the wear that makes the joint seize up is on the inside.<\/p>\n\n    <div class=\"mechanism\">\n      <div class=\"mechanism__label\">The Real Drivers<\/div>\n      <p class=\"mechanism__text\">Joint decline runs on <strong>three tracks at once<\/strong>: a runaway inflammation loop, the thinning of cartilage, and the age-related decline of the <strong>repair cells<\/strong> your cartilage depends on. A single-ingredient capsule pulls one lever while the other two keep working against you.<\/p>\n    <\/div>\n\n<figure style=\"margin:20px 0;text-align:center\">\n      <img src=\"images/real-cause-three-drivers.webp\" loading=\"lazy\" width=\"1280\" height=\"853\" alt=\"The three drivers of joint decline: a self-feeding inflammation loop, cartilage thinning, and the decline of repair cells\" style=\"width:100%;height:auto;border-radius:10px;display:block\">\n      <figcaption style=\"font-size:13px;color:#6b7280;margin-top:8px;font-style:italic\">Three problems running at once — a self-feeding inflammation loop, thinning cartilage, and repair cells fading with age.<\/figcaption>\n    <\/figure>\n\n    <p style=\"margin:0 0 14px\">That’s three separate problems pulling at the same time — and it’s exactly why single-answer fixes keep disappointing.
